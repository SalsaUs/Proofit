<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tenant Portal</title>
  <link rel="stylesheet" href="tenant.css" />
</head>

<body>

  <div class="container">

    <!-- LOGIN VIEW -->
    <div id="loginView" class="card">
      <h2>Tenant Login</h2>

      <input type="text" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Password" />

      <button onclick="login()">Login</button>

      <p class="small">Demo only — no backend connected</p>
    </div>

    <!-- DASHBOARD VIEW -->
    <div id="dashboardView" class="card hidden">
      <h2>Tenant Dashboard</h2>

      <p id="welcomeText"></p>

      <div class="actions">
        <button onclick="viewRent()">View Rent</button>
        <button onclick="viewMessages()">Messages</button>
        <button onclick="logout()">Logout</button>
      </div>

      <div id="outputBox" class="output"></div>
    </div>

  </div>

  <script src="tenant.js"></script>
</body>
</html>
