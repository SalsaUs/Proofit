<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tenant - ProofIt</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="phone-frame">
  <div class="app">

    <div class="top-bar">
      <button class="home-btn" onclick="goHome()">🏠</button>
      <h2>New Move-In Report</h2>
      <span class="badge">Tenant</span>
    </div>

    <div class="form-container">
      <h1>Let's get started</h1>
      <p class="helper">Fill in your details before the walkthrough</p>

      <div class="info-box">
        🔒 Your completed report is emailed directly to you.
      </div>

      <label>PROPERTY ADDRESS</label>
      <input type="text" class="address-input" />

      <div class="row">
        <div>
          <label>YOUR NAME</label>
          <input type="text" />
        </div>
        <div>
          <label>YOUR EMAIL</label>
          <input type="email" />
        </div>
      </div>

      <label>LEASE START DATE</label>
      <input type="date" />

      <button class="primary-btn" onclick="startWalkthrough()">
        Start Walkthrough →
      </button>
    </div>

  </div>
</div>

<script src="script.js?v=2"></script>
</body>
</html>
