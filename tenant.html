<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tenant - ProofIt</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

<div class="phone-frame">
  <div class="app">

    <h1 class="logo">Proof<span>It</span></h1>

    <h2 class="title">Tenant Portal</h2>
    <p class="subtitle">MOVE-IN CONDITION REPORT</p>

    <div class="card">
      <div>
        <strong>Start Report</strong>
        <p>Begin documenting your property</p>
      </div>
      <span>→</span>
    </div>

    <div class="card">
      <div>
        <strong>Upload Photos</strong>
        <p>Add condition evidence</p>
      </div>
      <span>→</span>
    </div>

    <div class="card">
      <div>
        <strong>Submit Report</strong>
        <p>Send to agent for review</p>
      </div>
      <span>→</span>
    </div>

    <div class="card" onclick="goHome()">
      <div>
        <strong>Back</strong>
        <p>Return to home screen</p>
      </div>
      <span>←</span>
    </div>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
