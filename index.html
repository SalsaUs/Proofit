<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ProofIt</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="phone-frame">
  <div class="app">

    <h1 class="logo">Proof<span>It</span></h1>

    <div class="icon-box">📋✔</div>

    <h2 class="title">Proof<span>It</span></h2>
    <p class="subtitle">PROPERTY CONDITION REPORTS</p>

    <h3>Who's using the app today?</h3>
    <p class="helper">Select your role to get started</p>

    <div class="card" onclick="selectRole('tenant')">
      <div>
        <strong>I'm a Tenant</strong>
        <p>Document your property on move-in</p>
      </div>
      <span class="arrow">→</span>
    </div>

    <div class="card" onclick="selectRole('agent')">
      <div>
        <strong>I'm an Agent</strong>
        <p>Run a professional property inspection</p>
      </div>
      <span class="arrow">→</span>
    </div>

    <p class="footer">ProofIt — Built for Australian renters & agents</p>

  </div>
</div>

<script src="script.js?v=2"></script>
</body>
</html>
