<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My First GitHub Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f0f8ff;
        }
        h1 {
            color: #0077cc;
        }
        p {
            color: #333333;
            font-size: 18px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1 id="title">Hello, GitHub!</h1>
    <p id="message">This is my first page displayed online using GitHub.</p>
    
    <button onclick="changeText()">Click Me!</button>
    
    <script>
        function changeText() {
            const title = document.getElementById('title');
            const message = document.getElementById('message');
            title.textContent = "You clicked the button!";
            message.textContent = "Welcome to interactive GitHub Pages!";
        }
    </script>
</body>
</html>
